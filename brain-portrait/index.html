<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CGX Brain Portrait | Attractor Visualizer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--surface:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);
  --text:#e0e0e8;--dim:#6a6a7a;--accent:#7b5ea7;--accent2:#4ecdc4;
  --delta:#3b82f6;--theta:#8b5cf6;--alpha:#10b981;--beta:#f59e0b;--gamma:#ef4444;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;overflow:hidden;height:100vh}
.app{display:grid;grid-template-columns:1fr 320px;grid-template-rows:60px 1fr;height:100vh}
header{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding:0 24px;
  border-bottom:1px solid var(--border);backdrop-filter:blur(20px);background:rgba(10,10,15,0.8)}
.logo{display:flex;align-items:center;gap:12px}
.logo svg{width:32px;height:32px}
.logo h1{font-size:16px;font-weight:600;letter-spacing:2px;text-transform:uppercase;
  background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo span{font-size:11px;color:var(--dim);font-family:'JetBrains Mono',monospace}
.state-badge{padding:6px 16px;border-radius:20px;font-size:12px;font-weight:600;font-family:'JetBrains Mono',monospace;
  border:1px solid var(--border);background:var(--surface);animation:pulse-glow 3s ease infinite}
@keyframes pulse-glow{0%,100%{box-shadow:0 0 8px rgba(123,94,167,0.2)}50%{box-shadow:0 0 20px rgba(123,94,167,0.5)}}
#canvas-container{position:relative;overflow:hidden}
#info-overlay{position:absolute;bottom:16px;left:16px;display:flex;gap:12px}
.info-pill{padding:4px 12px;border-radius:12px;font-size:11px;font-family:'JetBrains Mono',monospace;
  background:rgba(0,0,0,0.6);border:1px solid var(--border);backdrop-filter:blur(10px)}
aside{border-left:1px solid var(--border);padding:20px;overflow-y:auto;display:flex;flex-direction:column;gap:16px;
  background:rgba(10,10,15,0.9)}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px}
.panel h3{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--dim);margin-bottom:12px}
.band-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.band-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.band-label{font-size:12px;font-family:'JetBrains Mono',monospace;width:50px;color:var(--dim)}
.band-bar-bg{flex:1;height:6px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden}
.band-bar{height:100%;border-radius:3px;transition:width 0.3s ease}
.band-val{font-size:11px;font-family:'JetBrains Mono',monospace;width:36px;text-align:right;color:var(--dim)}
.lyapunov{text-align:center;padding:20px}
.lyapunov .value{font-size:36px;font-weight:700;font-family:'JetBrains Mono',monospace;
  background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.lyapunov .label{font-size:10px;color:var(--dim);margin-top:4px;text-transform:uppercase;letter-spacing:1px}
.timeline{height:80px;position:relative}
.timeline canvas{width:100%;height:100%;border-radius:8px}
.controls{display:flex;gap:8px;flex-wrap:wrap}
.controls button{flex:1;padding:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);
  border-radius:8px;font-size:11px;font-family:'JetBrains Mono',monospace;cursor:pointer;transition:all 0.2s}
.controls button:hover{background:rgba(123,94,167,0.2);border-color:var(--accent)}
.controls button.active{background:rgba(123,94,167,0.3);border-color:var(--accent)}
#drop-zone{border:2px dashed var(--border);border-radius:12px;padding:20px;text-align:center;cursor:pointer;
  transition:all 0.3s;font-size:12px;color:var(--dim)}
#drop-zone:hover,#drop-zone.drag-over{border-color:var(--accent);background:rgba(123,94,167,0.1)}
#drop-zone input{display:none}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">
      <svg viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="14" stroke="url(#lg)" stroke-width="1.5"/>
        <path d="M16 6 L16 26 M6 16 L26 16 M9 9 L23 23 M23 9 L9 23" stroke="url(#lg)" stroke-width="0.8" opacity="0.5"/>
        <circle cx="16" cy="16" r="4" fill="url(#lg)" opacity="0.6"/>
        <defs><linearGradient id="lg" x1="0" y1="0" x2="32" y2="32">
          <stop offset="0%" stop-color="#7b5ea7"/><stop offset="100%" stop-color="#4ecdc4"/></linearGradient></defs></svg>
      <div><h1>CGX Brain Portrait</h1><span>attractor topology visualizer</span></div>
    </div>
    <div class="state-badge" id="state-badge">AWAKE</div>
  </header>

  <div id="canvas-container">
    <div id="info-overlay">
      <div class="info-pill" id="pill-points">Points: 0</div>
      <div class="info-pill" id="pill-time">T: 0.0s</div>
      <div class="info-pill" id="pill-dim">θ × α × δ</div>
    </div>
  </div>

  <aside>
    <div class="panel">
      <h3>Band Power</h3>
      <div id="bands"></div>
    </div>
    <div class="panel lyapunov">
      <div class="value" id="lyap-val">0.00</div>
      <div class="label">Lyapunov Exponent (λ₁)</div>
    </div>
    <div class="panel">
      <h3>State Timeline</h3>
      <div class="timeline"><canvas id="timeline-canvas"></canvas></div>
    </div>
    <div class="panel controls">
      <button class="active" onclick="setSpeed(1)" id="btn-1x">1×</button>
      <button onclick="setSpeed(3)" id="btn-3x">3×</button>
      <button onclick="setSpeed(10)" id="btn-10x">10×</button>
      <button onclick="togglePause()" id="btn-pause">⏸</button>
    </div>
    <div id="drop-zone" onclick="document.getElementById('csv-input').click()">
      <strong>Drop Mind Monitor CSV</strong><br>or click to browse
      <input type="file" id="csv-input" accept=".csv">
    </div>
  </aside>
</div>

<script>
// === BAND CONFIG ===
const BANDS=[
  {name:'Delta',key:'delta',color:'#3b82f6',freq:'0.5-4 Hz'},
  {name:'Theta',key:'theta',color:'#8b5cf6',freq:'4-8 Hz'},
  {name:'Alpha',key:'alpha',color:'#10b981',freq:'8-13 Hz'},
  {name:'Beta',key:'beta',color:'#f59e0b',freq:'13-30 Hz'},
  {name:'Gamma',key:'gamma',color:'#ef4444',freq:'30-100 Hz'}
];
const STATES=['AWAKE','N1','N2','N3','REM'];
const STATE_COLORS=['#f59e0b','#8b5cf6','#3b82f6','#1e3a5f','#ef4444'];

// === SIMULATED EEG ===
function simBrainState(t){
  const cycle=t%300;// 5min sleep cycles for demo
  let state,bands;
  if(cycle<60){state=0;bands={delta:0.1,theta:0.15,alpha:0.4,beta:0.25,gamma:0.1}}
  else if(cycle<100){state=1;bands={delta:0.15,theta:0.35,alpha:0.25,beta:0.15,gamma:0.1}}
  else if(cycle<160){state=2;bands={delta:0.3,theta:0.3,alpha:0.15,beta:0.15,gamma:0.1}}
  else if(cycle<220){state=3;bands={delta:0.6,theta:0.2,alpha:0.08,beta:0.07,gamma:0.05}}
  else{state=4;bands={delta:0.15,theta:0.3,alpha:0.15,beta:0.2,gamma:0.2}}
  // Add noise + oscillation
  const n=k=>bands[k]+Math.sin(t*0.7+BANDS.findIndex(b=>b.key===k))*0.05+(Math.random()-0.5)*0.08;
  return{state,delta:Math.max(0,n('delta')),theta:Math.max(0,n('theta')),
    alpha:Math.max(0,n('alpha')),beta:Math.max(0,n('beta')),gamma:Math.max(0,n('gamma'))};
}

// === STATE ===
let data=[],csvData=null,simTime=0,speed=1,paused=false,maxTrail=2000;
let stateHistory=[];

// === THREE.JS SETUP ===
const container=document.getElementById('canvas-container');
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(60,1,0.1,1000);
camera.position.set(3,3,3);camera.lookAt(0,0,0);
const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setClearColor(0x0a0a0f,1);
container.appendChild(renderer.domElement);

// Grid
const gridHelper=new THREE.GridHelper(4,20,0x1a1a2e,0x1a1a2e);
scene.add(gridHelper);

// Axes
const axMat=a=>new THREE.LineBasicMaterial({color:a,transparent:true,opacity:0.4});
function mkAxis(dir,col){const g=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(),dir.clone().multiplyScalar(2.5)]);
  scene.add(new THREE.Line(g,axMat(col)))}
mkAxis(new THREE.Vector3(1,0,0),0x8b5cf6);// theta=x
mkAxis(new THREE.Vector3(0,1,0),0x10b981);// alpha=y
mkAxis(new THREE.Vector3(0,0,1),0x3b82f6);// delta=z

// Trail geometry
const trailMax=maxTrail;
const trailPositions=new Float32Array(trailMax*3);
const trailColors=new Float32Array(trailMax*3);
const trailGeo=new THREE.BufferGeometry();
trailGeo.setAttribute('position',new THREE.BufferAttribute(trailPositions,3));
trailGeo.setAttribute('color',new THREE.BufferAttribute(trailColors,3));
trailGeo.setDrawRange(0,0);
const trailMat=new THREE.PointsMaterial({size:0.05,vertexColors:true,transparent:true,opacity:0.8,sizeAttenuation:true});
const trailPoints=new THREE.Points(trailGeo,trailMat);
scene.add(trailPoints);

// Head point (current position)
const headGeo=new THREE.SphereGeometry(0.04,16,16);
const headMat=new THREE.MeshBasicMaterial({color:0x4ecdc4});
const headMesh=new THREE.Mesh(headGeo,headMat);
scene.add(headMesh);

// Glow
const glowGeo=new THREE.SphereGeometry(0.08,16,16);
const glowMat=new THREE.MeshBasicMaterial({color:0x7b5ea7,transparent:true,opacity:0.3});
const glowMesh=new THREE.Mesh(glowGeo,glowMat);
scene.add(glowMesh);

// === CAMERA ORBIT ===
let camAngle=0.5,camElevation=0.6,camDist=5,isDragging=false,lastMouse={x:0,y:0};
container.addEventListener('mousedown',e=>{isDragging=true;lastMouse={x:e.clientX,y:e.clientY}});
window.addEventListener('mouseup',()=>isDragging=false);
container.addEventListener('mousemove',e=>{if(!isDragging)return;
  camAngle+=(e.clientX-lastMouse.x)*0.005;camElevation=Math.max(0.1,Math.min(Math.PI/2-0.1,camElevation-(e.clientY-lastMouse.y)*0.005));
  lastMouse={x:e.clientX,y:e.clientY}});
container.addEventListener('wheel',e=>{camDist=Math.max(2,Math.min(12,camDist+e.deltaY*0.005))});

// === UI INIT ===
const bandsEl=document.getElementById('bands');
BANDS.forEach(b=>{
  bandsEl.innerHTML+=`<div class="band-row"><div class="band-dot" style="background:${b.color}"></div>
    <div class="band-label">${b.key[0].toUpperCase()+b.key.slice(1,2)}</div>
    <div class="band-bar-bg"><div class="band-bar" id="bar-${b.key}" style="background:${b.color};width:0%"></div></div>
    <div class="band-val" id="val-${b.key}">0</div></div>`;
});

// Timeline canvas
const tlCanvas=document.getElementById('timeline-canvas');
const tlCtx=tlCanvas.getContext('2d');

// === LYAPUNOV ESTIMATION ===
let prevState=null;
function estimateLyapunov(cur){
  if(!prevState){prevState=cur;return 0}
  const dx=cur.theta-prevState.theta,dy=cur.alpha-prevState.alpha,dz=cur.delta-prevState.delta;
  const dist=Math.sqrt(dx*dx+dy*dy+dz*dz);
  prevState=cur;
  return dist<1e-10?0:Math.log(Math.max(dist,1e-10))*0.3;// simplified for viz
}

// === CSV PARSER (Mind Monitor multi-electrode format) ===
function parseCSV(text){
  const lines=text.trim().split('\n');
  const headers=lines[0].split(',').map(h=>h.trim().toLowerCase());
  // Find all electrode columns for each band
  const electrodes=['_tp9','_af7','_af8','_tp10'];
  function findBandCols(band){
    const cols=[];
    for(const e of electrodes){
      const idx=headers.findIndex(h=>h===band+e);
      if(idx>=0)cols.push(idx);
    }
    // Fallback: single column
    if(cols.length===0){const idx=headers.findIndex(h=>h===band);if(idx>=0)cols.push(idx)}
    return cols;
  }
  const dCols=findBandCols('delta'),tCols=findBandCols('theta'),aCols=findBandCols('alpha');
  const bCols=findBandCols('beta'),gCols=findBandCols('gamma');
  if(dCols.length===0||tCols.length===0||aCols.length===0)return null;
  function avgCols(cols,parts){
    let sum=0,count=0;
    for(const c of cols){const v=parseFloat(parts[c]);if(!isNaN(v)){sum+=v;count++}}
    return count>0?sum/count:0;
  }
  const result=[];
  for(let r=1;r<lines.length;r++){
    const cols=lines[r].split(',');
    // Skip event-only rows (blink, jaw_clench, etc)
    if(cols[1]===''||cols[1]===undefined)continue;
    const d=avgCols(dCols,cols),t=avgCols(tCols,cols),a=avgCols(aCols,cols);
    const b=avgCols(bCols,cols),g=avgCols(gCols,cols);
    if(d===0&&t===0&&a===0)continue;// skip empty
    result.push({delta:d,theta:t,alpha:a,beta:b,gamma:g});
  }
  return result;
}

// === FILE DROP ===
const dropZone=document.getElementById('drop-zone');
const csvInput=document.getElementById('csv-input');
dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('drag-over')});
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('drag-over');handleFile(e.dataTransfer.files[0])});
csvInput.addEventListener('change',e=>handleFile(e.target.files[0]));
function handleFile(f){if(!f)return;const r=new FileReader();r.onload=e=>{
  const parsed=parseCSV(e.target.result);
  if(parsed&&parsed.length>10){csvData=parsed;data=[];simTime=0;stateHistory=[];
    dropZone.innerHTML='<strong>✓ '+f.name+'</strong><br>'+parsed.length+' samples loaded'}
  else{dropZone.innerHTML='<strong>⚠ Parse error</strong><br>Check CSV format'}};r.readAsText(f)}

// === AUTO-LOAD data.csv ===
fetch('data.csv').then(r=>{if(r.ok)return r.text();throw 0}).then(text=>{
  const parsed=parseCSV(text);
  if(parsed&&parsed.length>10){
    csvData=parsed;data=[];simTime=0;stateHistory=[];
    dropZone.innerHTML='<strong>✓ session_20260504_1.csv</strong><br>'+parsed.length+' samples loaded';
  }
}).catch(()=>{});

// === CLASSIFY STATE (heuristic) ===
function classifyState(d){
  if(d.delta>0.4)return 3;if(d.theta>0.3&&d.alpha<0.2)return 4;
  if(d.theta>0.25)return 1;if(d.delta>0.2)return 2;return 0;
}

// === RESIZE ===
function onResize(){
  const w=container.clientWidth,h=container.clientHeight;
  camera.aspect=w/h;camera.updateProjectionMatrix();renderer.setSize(w,h);
  tlCanvas.width=tlCanvas.parentElement.clientWidth*2;tlCanvas.height=tlCanvas.parentElement.clientHeight*2;
}
window.addEventListener('resize',onResize);

// === CONTROLS ===
window.setSpeed=s=>{speed=s;document.querySelectorAll('.controls button').forEach(b=>b.classList.remove('active'));
  document.getElementById('btn-'+s+'x').classList.add('active')};
window.togglePause=()=>{paused=!paused;document.getElementById('btn-pause').textContent=paused?'▶':'⏸'};

// === MAIN LOOP ===
function animate(){
  requestAnimationFrame(animate);
  if(!paused){
    for(let i=0;i<speed;i++){
      let sample;
      if(csvData){
        const idx=Math.floor(simTime)%csvData.length;
        const raw=csvData[idx];
        // Normalize using sigmoid-like mapping for dB values
        const norm=v=>1/(1+Math.exp(-v*2));// maps [-1,2] to [0.12,0.98]
        sample={delta:norm(raw.delta),theta:norm(raw.theta),alpha:norm(raw.alpha),
          beta:norm(raw.beta),gamma:norm(raw.gamma)};
      }else{
        sample=simBrainState(simTime);
      }
      const state=classifyState(sample);
      stateHistory.push(state);
      if(stateHistory.length>400)stateHistory.shift();

      // Scale to 3D space centered at origin
      const x=(sample.theta-0.5)*4;
      const y=(sample.alpha-0.5)*4;
      const z=(sample.delta-0.5)*4;

      data.push({x,y,z,state});
      if(data.length>trailMax)data.shift();

      simTime+=0.1;
    }

    // Update trail
    const n=data.length;
    for(let i=0;i<n;i++){
      const d=data[i];
      trailPositions[i*3]=d.x;trailPositions[i*3+1]=d.y;trailPositions[i*3+2]=d.z;
      const c=new THREE.Color(STATE_COLORS[d.state]);
      const fade=0.3+(i/n)*0.7;
      trailColors[i*3]=c.r*fade;trailColors[i*3+1]=c.g*fade;trailColors[i*3+2]=c.b*fade;
    }
    trailGeo.attributes.position.needsUpdate=true;
    trailGeo.attributes.color.needsUpdate=true;
    trailGeo.setDrawRange(0,n);

    // Update head
    if(n>0){
      const last=data[n-1];
      headMesh.position.set(last.x,last.y,last.z);
      glowMesh.position.copy(headMesh.position);
      glowMesh.scale.setScalar(1+Math.sin(Date.now()*0.005)*0.3);
    }

    // Update UI
    const cur=csvData?csvData[Math.floor(simTime)%csvData.length]:simBrainState(simTime);
    BANDS.forEach(b=>{
      const v=cur[b.key]||0;
      document.getElementById('bar-'+b.key).style.width=(v*100)+'%';
      document.getElementById('val-'+b.key).textContent=(v*100).toFixed(0);
    });
    const st=classifyState(cur);
    const badge=document.getElementById('state-badge');
    badge.textContent=STATES[st];badge.style.borderColor=STATE_COLORS[st];
    badge.style.boxShadow='0 0 12px '+STATE_COLORS[st]+'44';

    const lyap=estimateLyapunov(cur);
    document.getElementById('lyap-val').textContent=lyap.toFixed(3);

    document.getElementById('pill-points').textContent='Points: '+n;
    document.getElementById('pill-time').textContent='T: '+(simTime).toFixed(1)+'s';

    // Timeline
    const tw=tlCanvas.width,th=tlCanvas.height;
    tlCtx.fillStyle='rgba(10,10,15,0.15)';tlCtx.fillRect(0,0,tw,th);
    const sh=stateHistory;
    for(let i=0;i<sh.length;i++){
      const x=(i/400)*tw;
      tlCtx.fillStyle=STATE_COLORS[sh[i]];
      tlCtx.fillRect(x,0,Math.ceil(tw/400)+1,th);
    }
  }

  // Camera orbit (slow auto-rotate + drag)
  camAngle+=0.001;
  camera.position.x=Math.cos(camAngle)*Math.cos(camElevation)*camDist;
  camera.position.y=Math.sin(camElevation)*camDist;
  camera.position.z=Math.sin(camAngle)*Math.cos(camElevation)*camDist;
  camera.lookAt(0,0,0);

  renderer.render(scene,camera);
}

onResize();animate();
</script>
</body>
</html>
